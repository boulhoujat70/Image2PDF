<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Scanner Papier en PDF Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#007bff">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script>
    let cvReady = false;

    var Module = {
      onRuntimeInitialized() {
        cvReady = true;
        const statusEl = document.getElementById("status");
        const generateBtn = document.getElementById("generateBtn");
        if (statusEl) statusEl.innerText = "Moteur scanner prêt ✅";
        if (generateBtn) {
          generateBtn.disabled = false;
          generateBtn.innerText = "Numériser en PDF professionnel";
        }
      }
    };
  </script>
  <script async src="https://docs.opencv.org/4.x/opencv.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then((reg) => console.log('Service Worker enregistré !', reg.scope))
          .catch((err) => console.error('Erreur SW :', err));
      });
    }
  </script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef1f5;
      margin: 0;
      padding: 25px;
      text-align: center;
    }

    .box {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 5px 25px rgba(0,0,0,0.12);
    }

    h1 {
      margin-bottom: 8px;
      color: #111;
      font-size: 24px;
    }

    p {
      color: #666;
    }

    input, select, button {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      margin-top: 15px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #0056b3;
    }

    button:disabled {
      background: #999;
      cursor: not-allowed;
    }

    img, canvas {
      max-width: 100%;
      margin-top: 20px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    .info {
      font-size: 13px;
      color: #777;
      margin-top: 15px;
    }

    #outputCanvas {
      display: none;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>Scanner Papier en PDF Pro</h1>

    <p>
      Prends une photo d’une feuille blanche écrite au stylo.
      L’application va recadrer, redresser et nettoyer le document.
    </p>

    <p id="status">Chargement du moteur scanner (OpenCV)...</p>

    <input type="file" id="imageInput" accept="image/*" capture="environment">

    <select id="mode">
      <option value="bw">Rendu pro texte net — recommandé</option>
      <option value="gray">Rendu gris — plus naturel</option>
      <option value="color">Garder la couleur</option>
    </select>

    <img id="preview" style="display:none;">

    <canvas id="outputCanvas"></canvas>

    <button id="generateBtn" disabled>Attente du moteur...</button>

    <p class="info">
      Astuce : pose la feuille sur une table foncée, prends la photo bien droite, avec beaucoup de lumière.
    </p>
  </div>

  <canvas id="inputCanvas" style="display:none;"></canvas>

  <script>
    let selectedImage = null;

    const imageInput = document.getElementById("imageInput");
    const preview = document.getElementById("preview");
    const generateBtn = document.getElementById("generateBtn");
    const modeSelect = document.getElementById("mode");

    imageInput.addEventListener("change", function(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        selectedImage = e.target.result;
        preview.src = selectedImage;
        preview.style.display = "block";
      };
      reader.readAsDataURL(file);
    });

    generateBtn.addEventListener("click", generatePDF);

    function orderPoints(points) {
      let pts = [...points];
      pts.sort((a, b) => a.y - b.y);
      let topList = pts.slice(0, 2).sort((a, b) => a.x - b.x);
      let bottomList = pts.slice(2, 4).sort((a, b) => b.x - a.x);
      return [topList[0], topList[1], bottomList[0], bottomList[1]];
    }

    function findDocumentCorners(src) {
      let gray = new cv.Mat();
      let blur = new cv.Mat();
      let edges = new cv.Mat();
      let contours = new cv.MatVector();
      let hierarchy = new cv.Mat();

      cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
      cv.GaussianBlur(gray, blur, new cv.Size(5, 5), 0);
      cv.Canny(blur, edges, 75, 200);

      cv.findContours(edges, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

      let bestPoints = null;
      let maxArea = 0;
      const minArea = src.cols * src.rows * 0.12;

      for (let i = 0; i < contours.size(); i++) {
        let contour = contours.get(i);
        let area = cv.contourArea(contour);

        if (area > minArea && area > maxArea) {
          let peri = cv.arcLength(contour, true);
          let approx = new cv.Mat();
          cv.approxPolyDP(contour, approx, 0.02 * peri, true);

          if (approx.rows === 4) {
            let points = [];
            for (let j = 0; j < 4; j++) {
              points.push({
                x: approx.data32S[j * 2],
                y: approx.data32S[j * 2 + 1]
              });
            }
            bestPoints = points;
            maxArea = area;
          }
          approx.delete();
        }
        contour.delete();
      }

      gray.delete();
      blur.delete();
      edges.delete();
      contours.delete();
      hierarchy.delete();

      return bestPoints;
    }

    function perspectiveTransform(src, points) {
      const ordered = orderPoints(points);
      const [tl, tr, br, bl] = ordered;

      const widthA = Math.hypot(br.x - bl.x, br.y - bl.y);
      const widthB = Math.hypot(tr.x - tl.x, tr.y - tl.y);
      const maxWidth = Math.round(Math.max(widthA, widthB));

      const heightA = Math.hypot(tr.x - br.x, tr.y - br.y);
      const heightB = Math.hypot(tl.x - bl.x, tl.y - bl.y);
      const maxHeight = Math.round(Math.max(heightA, heightB));

      let srcTri = cv.matFromArray(4, 1, cv.CV_32FC2, [tl.x, tl.y, tr.x, tr.y, br.x, br.y, bl.x, bl.y]);
      let dstTri = cv.matFromArray(4, 1, cv.CV_32FC2, [0, 0, maxWidth - 1, 0, maxWidth - 1, maxHeight - 1, 0, maxHeight - 1]);

      let M = cv.getPerspectiveTransform(srcTri, dstTri);
      let dst = new cv.Mat();

      cv.warpPerspective(src, dst, M, new cv.Size(maxWidth, maxHeight), cv.INTER_LINEAR, cv.BORDER_REPLICATE);

      srcTri.delete();
      dstTri.delete();
      M.delete();

      return dst;
    }

    function enhanceDocument(src) {
      const mode = modeSelect.value;

      if (mode === "color") {
        let enhancedColor = new cv.Mat();
        src.convertTo(enhancedColor, -1, 1.3, -20);
        return enhancedColor;
      }

      let gray = new cv.Mat();
      cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

      if (mode === "gray") {
        let enhancedGray = new cv.Mat();
        gray.convertTo(enhancedGray, -1, 1.3, -15);
        gray.delete();
        return enhancedGray;
      }

      let enhancedBw = new cv.Mat();
      gray.convertTo(enhancedBw, -1, 1.65, -40);
      gray.delete();
      return enhancedBw;
    }

    function generatePDF() {
      if (!selectedImage) {
        alert("Ajoute d'abord une photo.");
        return;
      }

      if (!cvReady) {
        alert("Le moteur scanner n'est pas prêt.");
        return;
      }

      generateBtn.disabled = true;
      generateBtn.innerText = "Numérisation en cours...";

      const img = new Image();
      img.src = selectedImage;

      img.onload = function() {
        let src = null;
        let scanned = null;
        let enhanced = null;

        try {
          const inputCanvas = document.getElementById("inputCanvas");
          const inputCtx = inputCanvas.getContext("2d");

          inputCanvas.width = img.naturalWidth;
          inputCanvas.height = img.naturalHeight;
          inputCtx.drawImage(img, 0, 0);

          src = cv.imread(inputCanvas);

          let corners = findDocumentCorners(src);

          if (corners) {
            scanned = perspectiveTransform(src, corners);
          } else {
            scanned = src.clone();
            // L'alerte ne bloque plus le flux d'exécution principal
            setTimeout(() => { 
              alert("Feuille non détectée. Rendu généré à plat avec effet scanner."); 
            }, 50);
          }

          // Application des filtres de nettoyage pro
          enhanced = enhanceDocument(scanned);

          const outputCanvas = document.getElementById("outputCanvas");
          cv.imshow(outputCanvas, enhanced);

          // Génération immédiate du PDF à partir du canvas de sortie
          const { jsPDF } = window.jspdf;
          const imgWidth = outputCanvas.width;
          const imgHeight = outputCanvas.height;
          const orientation = imgWidth > imgHeight ? "l" : "p";

          const pdf = new jsPDF({
            orientation: orientation,
            unit: "mm",
            format: "a4"
          });

          const pageWidth = orientation === "l" ? 297 : 210;
          const pageHeight = orientation === "l" ? 210 : 297;

          const margin = 6;
          const maxWidth = pageWidth - margin * 2;
          const maxHeight = pageHeight - margin * 2;

          const ratio = Math.min(maxWidth / imgWidth, maxHeight / imgHeight);
          const finalWidth = imgWidth * ratio;
          const finalHeight = imgHeight * ratio;

          const x = (pageWidth - finalWidth) / 2;
          const y = (pageHeight - finalHeight) / 2;

          const imageData = outputCanvas.toDataURL("image/jpeg", 0.92);

          pdf.addImage(imageData, "JPEG", x, y, finalWidth, finalHeight, undefined, 'FAST');
          pdf.save("scan_professionnel.pdf");

        } catch (error) {
          console.error(error);
          alert("Erreur lors de la création du PDF.");
        } finally {
          if (src) src.delete();
          if (scanned) scanned.delete();
          if (enhanced) enhanced.delete();

          generateBtn.disabled = false;
          generateBtn.innerText = "Numériser en PDF professionnel";
        }
      };
    }
  </script>

</body>
</html>
