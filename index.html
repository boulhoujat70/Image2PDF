<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Scanner Papier en PDF Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- OpenCV pour détection de feuille / redressement -->
  <script>
    let cvReady = false;

    var Module = {
      onRuntimeInitialized() {
        cvReady = true;
        document.getElementById("status").innerText = "Moteur scanner prêt ✅";
      }
    };
  </script>
  <script async src="https://docs.opencv.org/4.x/opencv.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef1f5;
      margin: 0;
      padding: 25px;
      text-align: center;
    }

    .box {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 5px 25px rgba(0,0,0,0.12);
    }

    h1 {
      margin-bottom: 8px;
      color: #111;
    }

    p {
      color: #666;
    }

    input, select, button {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      margin-top: 15px;
      font-size: 16px;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      background: #999;
      cursor: not-allowed;
    }

    img, canvas {
      max-width: 100%;
      margin-top: 20px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    .info {
      font-size: 13px;
      color: #777;
      margin-top: 15px;
    }

    #outputCanvas {
      display: none;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>Scanner Papier en PDF Pro</h1>

    <p>
      Prends une photo d’une feuille blanche écrite au stylo.
      L’application va recadrer, redresser et nettoyer le document.
    </p>

    <p id="status">Chargement du moteur scanner...</p>

    <input type="file" id="imageInput" accept="image/*" capture="environment">

    <select id="mode">
      <option value="bw">Rendu pro noir/blanc — recommandé</option>
      <option value="gray">Rendu gris — plus naturel</option>
      <option value="color">Garder la couleur</option>
    </select>

    <img id="preview" style="display:none;">

    <canvas id="outputCanvas"></canvas>

    <button id="generateBtn">Numériser en PDF professionnel</button>

    <p class="info">
      Astuce : pose la feuille sur une table foncée, prends la photo bien droite, avec beaucoup de lumière.
    </p>
  </div>

  <canvas id="inputCanvas" style="display:none;"></canvas>

  <script>
    let selectedImage = null;

    const imageInput = document.getElementById("imageInput");
    const preview = document.getElementById("preview");
    const generateBtn = document.getElementById("generateBtn");
    const modeSelect = document.getElementById("mode");

    imageInput.addEventListener("change", function(event) {
      const file = event.target.files[0];

      if (!file) return;

      const reader = new FileReader();

      reader.onload = function(e) {
        selectedImage = e.target.result;
        preview.src = selectedImage;
        preview.style.display = "block";
      };

      reader.readAsDataURL(file);
    });

    generateBtn.addEventListener("click", generatePDF);

    function orderPoints(points) {
      let tl = points[0];
      let tr = points[0];
      let br = points[0];
      let bl = points[0];

      for (const p of points) {
        if (p.x + p.y < tl.x + tl.y) tl = p;
        if (p.x + p.y > br.x + br.y) br = p;
        if (p.x - p.y > tr.x - tr.y) tr = p;
        if (p.x - p.y < bl.x - bl.y) bl = p;
      }

      return [tl, tr, br, bl];
    }

    function findDocumentCorners(src) {
      let gray = new cv.Mat();
      let blur = new cv.Mat();
      let edges = new cv.Mat();
      let contours = new cv.MatVector();
      let hierarchy = new cv.Mat();

      cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
      cv.GaussianBlur(gray, blur, new cv.Size(5, 5), 0);
      cv.Canny(blur, edges, 50, 150);

      cv.findContours(
        edges,
        contours,
        hierarchy,
        cv.RETR_EXTERNAL,
        cv.CHAIN_APPROX_SIMPLE
      );

      let bestPoints = null;
      let maxArea = 0;
      const minArea = src.cols * src.rows * 0.15;

      for (let i = 0; i < contours.size(); i++) {
        let contour = contours.get(i);
        let area = cv.contourArea(contour);

        if (area > minArea && area > maxArea) {
          let peri = cv.arcLength(contour, true);
          let approx = new cv.Mat();

          cv.approxPolyDP(contour, approx, 0.02 * peri, true);

          if (approx.rows === 4) {
            let points = [];

            for (let j = 0; j < 4; j++) {
              points.push({
                x: approx.data32S[j * 2],
                y: approx.data32S[j * 2 + 1]
              });
            }

            bestPoints = points;
            maxArea = area;
          }

          approx.delete();
        }

        contour.delete();
      }

      gray.delete();
      blur.delete();
      edges.delete();
      contours.delete();
      hierarchy.delete();

      return bestPoints;
    }

    function perspectiveTransform(src, points) {
      const ordered = orderPoints(points);
      const [tl, tr, br, bl] = ordered;

      const widthA = Math.hypot(br.x - bl.x, br.y - bl.y);
      const widthB = Math.hypot(tr.x - tl.x, tr.y - tl.y);
      const maxWidth = Math.round(Math.max(widthA, widthB));

      const heightA = Math.hypot(tr.x - br.x, tr.y - br.y);
      const heightB = Math.hypot(tl.x - bl.x, tl.y - bl.y);
      const maxHeight = Math.round(Math.max(heightA, heightB));

      let srcTri = cv.matFromArray(4, 1, cv.CV_32FC2, [
        tl.x, tl.y,
        tr.x, tr.y,
        br.x, br.y,
        bl.x, bl.y
      ]);

      let dstTri = cv.matFromArray(4, 1, cv.CV_32FC2, [
        0, 0,
        maxWidth - 1, 0,
        maxWidth - 1, maxHeight - 1,
        0, maxHeight - 1
      ]);

      let M = cv.getPerspectiveTransform(srcTri, dstTri);
      let dst = new cv.Mat();

      cv.warpPerspective(
        src,
        dst,
        M,
        new cv.Size(maxWidth, maxHeight),
        cv.INTER_LINEAR,
        cv.BORDER_REPLICATE
      );

      srcTri.delete();
      dstTri.delete();
      M.delete();

      return dst;
    }

    function enhanceDocument(src) {
      const mode = modeSelect.value;

      if (mode === "color") {
        return src.clone();
      }

      let gray = new cv.Mat();
      cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

      if (mode === "gray") {
        let enhanced = new cv.Mat();
        gray.convertTo(enhanced, -1, 1.25, -10);
        gray.delete();
        return enhanced;
      }

      let blurred = new cv.Mat();
      let bw = new cv.Mat();

      cv.medianBlur(gray, blurred, 3);

      cv.adaptiveThreshold(
        blurred,
        bw,
        255,
        cv.ADAPTIVE_THRESH_GAUSSIAN_C,
        cv.THRESH_BINARY,
        35,
        15
      );

      gray.delete();
      blurred.delete();

      return bw;
    }

    function addCanvasToPDF(canvas) {
      const { jsPDF } = window.jspdf;

      const imgWidth = canvas.width;
      const imgHeight = canvas.height;

      const orientation = imgWidth > imgHeight ? "l" : "p";

      const pdf = new jsPDF({
        orientation: orientation,
        unit: "mm",
        format: "a4"
      });

      const pageWidth = orientation === "l" ? 297 : 210;
      const pageHeight = orientation === "l" ? 210 : 297;

      const margin = 8;
      const maxWidth = pageWidth - margin * 2;
      const maxHeight = pageHeight - margin * 2;

      const ratio = Math.min(maxWidth / imgWidth, maxHeight / imgHeight);

      const finalWidth = imgWidth * ratio;
      const finalHeight = imgHeight * ratio;

      const x = (pageWidth - finalWidth) / 2;
      const y = (pageHeight - finalHeight) / 2;

      const imageData = canvas.toDataURL("image/png");

      pdf.addImage(
        imageData,
        "PNG",
        x,
        y,
        finalWidth,
        finalHeight
      );

      pdf.save("scan_professionnel.pdf");
    }

    function generatePDF() {
      if (!selectedImage) {
        alert("Ajoute d'abord une photo.");
        return;
      }

      if (!cvReady) {
        alert("Le moteur scanner n'est pas encore chargé. Attends quelques secondes.");
        return;
      }

      if (!window.jspdf) {
        alert("La bibliothèque PDF n'est pas chargée.");
        return;
      }

      generateBtn.disabled = true;
      generateBtn.innerText = "Numérisation en cours...";

      const img = new Image();

      img.onload = function() {
        try {
          const inputCanvas = document.getElementById("inputCanvas");
          const inputCtx = inputCanvas.getContext("2d");

          inputCanvas.width = img.naturalWidth;
          inputCanvas.height = img.naturalHeight;

          inputCtx.drawImage(img, 0, 0);

          let src = cv.imread(inputCanvas);

          let corners = findDocumentCorners(src);
          let scanned;

          if (corners) {
            scanned = perspectiveTransform(src, corners);
          } else {
            scanned = src.clone();
            alert("Feuille non détectée automatiquement. Le PDF sera généré sans redressement.");
          }

          let enhanced = enhanceDocument(scanned);

          const outputCanvas = document.getElementById("outputCanvas");
          cv.imshow(outputCanvas, enhanced);

          addCanvasToPDF(outputCanvas);

          src.delete();
          scanned.delete();
          enhanced.delete();

        } catch (error) {
          console.error(error);
          alert("Erreur pendant la numérisation.");
        }

        generateBtn.disabled = false;
        generateBtn.innerText = "Numériser en PDF professionnel";
      };

      img.onerror = function() {
        alert("Impossible de lire la photo.");
        generateBtn.disabled = false;
        generateBtn.innerText = "Numériser en PDF professionnel";
      };

      img.src = selectedImage;
    }
  </script>

</body>
</html>
