<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Scanner de Documents en PDF HD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f2f5;
      padding: 30px;
      text-align: center;
      color: #333;
    }

    .box {
      background: white;
      max-width: 550px;
      margin: auto;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 24px;
      margin-bottom: 5px;
      color: #111;
    }

    p {
      color: #666;
      font-size: 15px;
    }

    .file-input-wrapper {
      margin: 25px 0;
    }

    img {
      max-width: 100%;
      max-height: 350px;
      margin-top: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      object-fit: contain;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      padding: 16px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      margin-top: 20px;
      width: 100%;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover {
      background: #0056b3;
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .info {
      font-size: 13px;
      color: #888;
      margin-top: 15px;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>Scanner une page manuscrite</h1>
    <p>Prends en photo ton document écrit au stylo pour le convertir en PDF net, lisse et professionnel.</p>

    <div class="file-input-wrapper">
      <input type="file" id="imageInput" accept="image/*">
    </div>

    <div>
      <img id="preview" style="display:none;">
    </div>

    <button id="generateBtn" onclick="generatePDF()">Numériser et Générer le PDF</button>

    <p class="info">L'optimisation "effet scanner HD" est faite localement dans ton navigateur.</p>
  </div>

  <canvas id="processingCanvas" style="display:none;"></canvas>

  <script>
    let selectedImage = null;

    const imageInput = document.getElementById("imageInput");
    const preview = document.getElementById("preview");
    const generateBtn = document.getElementById("generateBtn");

    imageInput.addEventListener("change", function(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        selectedImage = e.target.result;
        preview.src = selectedImage;
        preview.style.display = "block";
      };
      reader.readAsDataURL(file);
    });

    function enhanceImage(img, callback) {
      const canvas = document.getElementById("processingCanvas");
      const ctx = canvas.getContext("2d");

      // On préserve la résolution maximale d'origine de la photo
      canvas.width = img.naturalWidth || img.width;
      canvas.height = img.naturalHeight || img.height;

      // Filtres CSS professionnels pour blanchir le fond et lisser les tracés de stylo
      ctx.filter = "contrast(180%) brightness(120%) grayscale(10%)";
      
      // Dessin de l'image sur le canvas avec les filtres appliqués
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      // Exportation en JPEG haute qualité (95%)
      callback(canvas.toDataURL("image/jpeg", 0.95));
    }

    async function generatePDF() {
      if (!selectedImage) {
        alert("Ajoute ou prends d'abord une photo.");
        return;
      }

      generateBtn.disabled = true;
      generateBtn.innerText = "Optimisation HD en cours...";

      const { jsPDF } = window.jspdf;
      const img = new Image();
      img.src = selectedImage;

      img.onload = function() {
        // Lancement du traitement de l'image
        enhanceImage(img, function(processedImageData) {
          const imgWidth = img.naturalWidth || img.width;
          const imgHeight = img.naturalHeight || img.height;

          // Détection automatique du format (Portrait ou Paysage)
          const orientation = imgWidth > imgHeight ? "l" : "p";
          const pdf = new jsPDF(orientation, "mm", "a4");

          const pageWidth = orientation === "l" ? 297 : 210;
          const pageHeight = orientation === "l" ? 210 : 297;

          // Marges de sécurité de 5mm
          const margin = 5;
          const maxWidth = pageWidth - margin * 2;
          const maxHeight = pageHeight - margin * 2;

          // Calcul du ratio pour adapter l'image sans déformation
          const ratio = Math.min(maxWidth / imgWidth, maxHeight / imgHeight);
          const finalWidth = imgWidth * ratio;
          const finalHeight = imgHeight * ratio;

          // Centrage de l'image
          const x = (pageWidth - finalWidth) / 2;
          const y = (pageHeight - finalHeight) / 2;

          // Ajout de l'image optimisée et sauvegarde
          pdf.addImage(processedImageData, "JPEG", x, y, finalWidth, finalHeight, undefined, 'FAST');
          pdf.save("document_scan_hd.pdf");

          // Remise à l'état initial du bouton
          generateBtn.disabled = false;
          generateBtn.innerText = "Numériser et Générer le PDF";
        });
      };

      img.onerror = function() {
        alert("Erreur lors du traitement de l'image.");
        generateBtn.disabled = false;
        generateBtn.innerText = "Numériser et Générer le PDF";
      };
    }
  </script>

</body>
</html>
