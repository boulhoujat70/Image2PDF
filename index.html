<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Scanner de Documents en PDF HD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      padding: 30px;
      text-align: center;
      color: #333;
    }

    .box {
      background: white;
      max-width: 650px;
      margin: auto;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    h1 {
      color: #111;
    }

    p {
      color: #666;
    }

    input {
      margin: 25px 0;
    }

    img {
      max-width: 100%;
      max-height: 400px;
      margin-top: 15px;
      border: 2px solid #ddd;
      border-radius: 8px;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      padding: 16px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 17px;
      font-weight: bold;
      margin-top: 20px;
      width: 100%;
    }

    button:hover {
      background: #0056b3;
    }

    button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    .info {
      font-size: 13px;
      color: #888;
      margin-top: 15px;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>Scanner une page manuscrite</h1>
    <p>Prends en photo ton document pour le convertir en PDF net, propre et lisible.</p>

    <input type="file" id="imageInput" accept="image/*" capture="environment">

    <div>
      <img id="preview" style="display:none;">
    </div>

    <button id="generateBtn">Numériser et Générer le PDF</button>

    <p class="info">
      Traitement local dans ton navigateur : recadrage automatique + amélioration légère.
    </p>
  </div>

  <canvas id="canvas" style="display:none;"></canvas>

  <script>
    let selectedImage = null;

    const imageInput = document.getElementById("imageInput");
    const preview = document.getElementById("preview");
    const generateBtn = document.getElementById("generateBtn");

    imageInput.addEventListener("change", function(event) {
      const file = event.target.files[0];

      if (!file) return;

      const reader = new FileReader();

      reader.onload = function(e) {
        selectedImage = e.target.result;
        preview.src = selectedImage;
        preview.style.display = "block";
      };

      reader.readAsDataURL(file);
    });

    generateBtn.addEventListener("click", generatePDF);

    function autoCropWhite(canvas) {
      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      const width = canvas.width;
      const height = canvas.height;
      const imageData = ctx.getImageData(0, 0, width, height);
      const data = imageData.data;

      let top = null;
      let bottom = null;
      let left = null;
      let right = null;

      const threshold = 245;

      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const index = (y * width + x) * 4;
          const r = data[index];
          const g = data[index + 1];
          const b = data[index + 2];

          const isNotWhite = r < threshold || g < threshold || b < threshold;

          if (isNotWhite) {
            if (top === null) top = y;
            bottom = y;

            if (left === null || x < left) left = x;
            if (right === null || x > right) right = x;
          }
        }
      }

      if (top === null) {
        return canvas;
      }

      const padding = 40;

      left = Math.max(0, left - padding);
      top = Math.max(0, top - padding);
      right = Math.min(width, right + padding);
      bottom = Math.min(height, bottom + padding);

      const cropWidth = right - left;
      const cropHeight = bottom - top;

      const croppedCanvas = document.createElement("canvas");
      const croppedCtx = croppedCanvas.getContext("2d");

      croppedCanvas.width = cropWidth;
      croppedCanvas.height = cropHeight;

      croppedCtx.fillStyle = "white";
      croppedCtx.fillRect(0, 0, cropWidth, cropHeight);

      croppedCtx.drawImage(
        canvas,
        left,
        top,
        cropWidth,
        cropHeight,
        0,
        0,
        cropWidth,
        cropHeight
      );

      return croppedCanvas;
    }

    function enhanceImage(img) {
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;

      ctx.fillStyle = "white";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.imageSmoothingEnabled = false;

      /*
        Important :
        filtre léger seulement.
        Avant, contrast 180% + brightness 120% rendait le document trop blanc et flou.
      */
      ctx.filter = "contrast(115%) brightness(105%)";
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      return autoCropWhite(canvas);
    }

    function generatePDF() {
      if (!selectedImage) {
        alert("Ajoute d'abord une photo.");
        return;
      }

      if (!window.jspdf) {
        alert("Erreur : jsPDF n'est pas chargé. Vérifie ta connexion internet.");
        return;
      }

      generateBtn.disabled = true;
      generateBtn.innerText = "Génération du PDF...";

      const img = new Image();

      img.onload = function() {
        try {
          const processedCanvas = enhanceImage(img);

          const { jsPDF } = window.jspdf;

          const imgWidth = processedCanvas.width;
          const imgHeight = processedCanvas.height;

          const orientation = imgWidth > imgHeight ? "l" : "p";

          const pdf = new jsPDF({
            orientation: orientation,
            unit: "mm",
            format: "a4"
          });

          const pageWidth = orientation === "l" ? 297 : 210;
          const pageHeight = orientation === "l" ? 210 : 297;

          const margin = 6;

          const maxWidth = pageWidth - margin * 2;
          const maxHeight = pageHeight - margin * 2;

          const ratio = Math.min(maxWidth / imgWidth, maxHeight / imgHeight);

          const finalWidth = imgWidth * ratio;
          const finalHeight = imgHeight * ratio;

          const x = (pageWidth - finalWidth) / 2;
          const y = (pageHeight - finalHeight) / 2;

          /*
            PNG = meilleure qualité pour texte, facture, manuscrit.
            C'est plus lourd qu'un JPEG, mais beaucoup plus net.
          */
          const imageData = processedCanvas.toDataURL("image/png");

          pdf.addImage(
            imageData,
            "PNG",
            x,
            y,
            finalWidth,
            finalHeight
          );

          pdf.save("document_scanner_hd.pdf");

        } catch (error) {
          console.error(error);
          alert("Erreur pendant la génération du PDF.");
        }

        generateBtn.disabled = false;
        generateBtn.innerText = "Numériser et Générer le PDF";
      };

      img.onerror = function() {
        alert("Impossible de charger l'image.");
        generateBtn.disabled = false;
        generateBtn.innerText = "Numériser et Générer le PDF";
      };

      img.src = selectedImage;
    }
  </script>

</body>
</html>
